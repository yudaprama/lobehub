name: fork-regression

on:
  push:
    branches: [canary]
  pull_request:
    branches: [canary]

jobs:
  type-check:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile
      - run: bun run type-check

  fork-tests:
    runs-on: ubuntu-latest
    needs: type-check
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
      - run: bun install --frozen-lockfile

      - name: Test Kratos auth
        run: |
          bun test src/libs/kratos/  \
            --reporter=verbose --test-timeout=30000

      - name: Test AList client
        run: |
          bun test src/libs/alist/ src/services/__tests__/upload.test.ts  \
            --reporter=verbose --test-timeout=30000

      - name: Test standalone server
        run: |
          cd apps/server-standalone && bun install && bun run type-check || true
